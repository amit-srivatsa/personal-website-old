<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>
    <!-- Include the script that builds the page and powers Netlify CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <div id="debug-log"
        style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: lime; font-family: monospace; padding: 10px; max-height: 200px; overflow: auto; z-index: 9999; display: none;">
        Debug Log:
    </div>
    <script>
        // Debug script to check if we receive auth messages
        window.addEventListener("message", function (e) {
            const loginfo = document.getElementById('debug-log');
            if (e.data && typeof e.data === 'string' && e.data.startsWith('authorization:')) {
                loginfo.style.display = 'block';
                const div = document.createElement('div');
                div.innerText = 'Received Auth Message: ' + e.data.substring(0, 50) + '...';
                loginfo.appendChild(div);
                console.log("Decap CMS Auth Debug:", e.data);
            }
        });
    </script>
</body>

</html>
